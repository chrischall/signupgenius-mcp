name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      # Strip always-auth from .npmrc (set by setup-node, deprecated in npm 11)
      - run: sed -i '/always-auth/d' "$NPM_CONFIG_USERCONFIG"

      - run: npm ci
      - run: npm run build

      - name: Extract version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      # Sync in-repo version files to match the tag.
      - name: Sync version files to $VERSION
        run: |
          node -e "
            const fs = require('fs');
            for (const f of ['manifest.json', 'server.json', '.claude-plugin/plugin.json', '.claude-plugin/marketplace.json']) {
              if (!fs.existsSync(f)) continue;
              const o = JSON.parse(fs.readFileSync(f, 'utf8'));
              if (o.version !== undefined) o.version = '$VERSION';
              if (o.metadata?.version !== undefined) o.metadata.version = '$VERSION';
              if (Array.isArray(o.packages)) o.packages.forEach(p => { if (p.version !== undefined) p.version = '$VERSION'; });
              if (Array.isArray(o.plugins)) o.plugins.forEach(p => { if (p.version !== undefined) p.version = '$VERSION'; });
              fs.writeFileSync(f, JSON.stringify(o, null, 2) + '\n');
            }
          "

      - name: Build .mcpb bundle
        run: |
          npx @anthropic-ai/mcpb pack
          mv signupgenius-mcp.mcpb "signupgenius-mcp-${VERSION}.mcpb"

      # Idempotent npm publish: skip if this exact version is already on the
      # registry. Lets us re-run the release workflow on the same tag without
      # tripping E409, and lets the registry/GitHub-release steps below recover
      # cleanly when npm succeeded on a prior attempt but a later step failed.
      - name: Publish to npm
        run: |
          PKG=$(node -p "require('./package.json').name")
          PUBLISHED=$(npm view "${PKG}@${VERSION}" version 2>/dev/null || true)
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "npm already has ${PKG}@${VERSION} — skipping publish."
            exit 0
          fi
          npm publish --access public --provenance

      # ─── modelcontextprotocol/registry (PulseMCP auto-ingests weekly) ───
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            signupgenius-mcp-${{ env.VERSION }}.mcpb
          generate_release_notes: true
